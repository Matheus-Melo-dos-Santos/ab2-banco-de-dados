version: "3.9"

services:
  redis:
    image: redis:7.2-alpine
    container_name: redis_movies
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data               # persistência do RDB/AOF
      - ./data:/import/data:ro         # CSVs copiados aqui (read-only)
    command: >
      redis-server
        --appendonly yes
        --appendfsync everysec
        --save 60 1
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  importer:
    image: python:3.12-slim
    container_name: redis_importer
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./data:/import/data:ro
      - ./scripts:/scripts:ro
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    working_dir: /scripts
    command: >
      sh -c "
        pip install redis --quiet &&
        python import_data.py &&
        python demo_commands.py
      "

volumes:
  redis_data:
    driver: local
